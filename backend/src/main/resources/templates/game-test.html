<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Test</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <style>
        body { font-family: Arial; padding: 20px }
        .card { border: 1px solid #aaa; padding: 6px; margin: 6px }
        .active { background: #e6ffe6 }
        .effect { font-size: 12px; color: #444 }
        .error { background:#ffe6e6;color:#900;padding:8px;margin-bottom:10px }
        button { margin: 4px }
    </style>
</head>
<body>

<h2>Game Test</h2>

<div id="errors"></div>
<div id="status"></div>

<button onclick="attackPlayer()">Attack player</button>
<button onclick="endTurn()">End turn</button>

<h3>Players</h3>
<div id="players"></div>

<h3>Your hand</h3>
<div id="hand"></div>

<h3>Played cards</h3>
<div id="played"></div>

<h3>Market</h3>
<div id="market"></div>

<h3>Explorers</h3>
<div id="explorers"></div>

<script>
    const gameId = localStorage.getItem("gameId");
    const token = localStorage.getItem("accessToken");

    let gameView = null;
    let privateView = null;

    const client = new StompJs.Client({
        webSocketFactory: () => new SockJS("http://localhost:8080/ws"),
        connectHeaders: { Authorization: "Bearer " + token },

        onConnect: () => {

            client.subscribe("/topic/game." + gameId, m => {
                gameView = JSON.parse(m.body);
                render();
            });

            client.subscribe("/user/queue/game." + gameId, m => {
                privateView = JSON.parse(m.body);
                render();
            });

            client.subscribe("/user/queue/errors", m => {
                const e = JSON.parse(m.body);
                showError(e.code + ": " + e.message);
            });

            client.publish({
                destination: "/app/game.init",
                body: JSON.stringify({ gameId })
            });
        }
    });
    client.activate();

    function render() {
        if (!gameView) return;

        renderStatus();
        renderPlayers();

        if (privateView) {
            renderHand();
            renderPlayed();
        }

        renderMarket();
        renderExplorers();
    }

    /* ================= CARD ================= */

    function cardView(c) {
        return `
    <div class="card">
        <b>${c.name}</b> | cost: ${c.cost ?? "-"}
        <div class="effect">
            type:${c.type} | faction:${c.cardFaction}
            ${c.defense > 0 ? `| def:${c.defense}` : ""}
        </div>

        ${renderSetEffects("Main", c.mainEffects)}
        ${renderSetEffects("Faction", c.factionEffectsLvl1)}
        ${renderSetEffects("Scrap", c.scrapEffects)}
    </div>`;
    }

    function renderSetEffects(title, set) {
        if (!set || !set.effects?.length) return "";

        return `
    <div class="effect">
        <b>${title}</b>:
        ${set.effects.map(e => `${e.type}+${e.value}`).join(", ")}
    </div>`;
    }

    /* ================= STATUS ================= */

    function renderStatus() {
        document.getElementById("status").innerHTML =
            `Status: ${gameView.status}
         ${gameView.winnerId ? "<b> Winner: "+gameView.winnerId+"</b>" : ""}`;
    }

    /* ================= PLAYERS ================= */

    function renderPlayers() {
        const div = document.getElementById("players");
        div.innerHTML = "";

        gameView.players.forEach(p => {
            div.innerHTML += `
        <div class="${p.active ? "active" : ""}">
            <b>${p.playerId}</b>
            HP:${p.health}
            ATK:${p.currentAttack}
            GOLD:${p.currentGold} <br>

            FD:${p.forcedDiscard}
            EX:${p.rightExile}
            DESTROY:${p.destroyBase}
            TOP:${p.topDeckNextShip}
            FREE:${p.buyFreeTopDeck}

            <div>
                <b>Bases</b>
                ${p.bases.map(b => structureView(b)).join("")}
            </div>

            <div>
                <b>Outposts</b>
                ${p.outposts.map(o => structureView(o)).join("")}
            </div>
        </div>`;
        });
    }

    /* ================= STRUCTURES ================= */

    function structureView(c) {
        return `
    <div class="card">
        <b>${cardView(c)}</b>

        <button onclick="attackStructure('${c.id}','${c.type}')">
            Attack
        </button>

        <button onclick="scrapStructure('${c.id}')">
            Scrap
        </button>

        <button onclick="destroyBase('${c.id}')">
            Destroy base
        </button>
    </div>`;
    }

    /* ================= HAND ================= */

    function renderHand() {
        const div = document.getElementById("hand");
        div.innerHTML = "";

        const me = getMe();
        if (!me) return;

        privateView.hand.forEach(c => {

            const hasScrap =
                c.scrapEffects &&
                c.scrapEffects.effects &&
                c.scrapEffects.effects.length > 0;

            const scrapCheckbox = hasScrap ? `
            <label>
                <input type="checkbox" id="scrap-${c.id}">
                scrap
            </label>
        ` : "";

            const factionSelect = c.code === "CORE_MERCENARY" ? `
            <select id="cardFaction-${c.id}">
                <option value="">-- cardFaction --</option>
                <option value="BLOB">BLOB</option>
                <option value="MACHINE_CULT">MACHINE_CULT</option>
                <option value="STAR_EMPIRE">STAR_EMPIRE</option>
                <option value="TRADE_FEDERATION">TRADE_FEDERATION</option>
            </select>
        ` : "";

            const forcedDiscardBtn = me.forcedDiscard > 0
                ? `<button onclick="forcedDiscard('${c.id}')">Forced discard</button>`
                : "";

            div.innerHTML += `
            ${cardView(c)}
            ${factionSelect}
            ${scrapCheckbox}
            <br>
            <button onclick="play('${c.id}')">Play</button>
            <button onclick="exile('${c.id}','${c.code}')">Exile</button>
            ${forcedDiscardBtn}
        `;
        });
    }

    /* ================= PLAYED ================= */

    function renderPlayed() {
        const div = document.getElementById("played");
        div.innerHTML = "";

        const activePlayer = gameView.players.find(p => p.active);
        if (!activePlayer) return;

        div.innerHTML = `<h4>Played: ${activePlayer.playerId}</h4>`;

        activePlayer.playedCards?.forEach(c => {
            div.innerHTML += cardView(c);
        });
    }

    /* ================= MARKET ================= */

    function renderMarket() {
        const div = document.getElementById("market");
        div.innerHTML = "";

        const me = getMe();
        if (!me) return;

        gameView.market.forEach(c => {

            const buyBtn = `
            <button onclick="buy('${c.id}', 'NORMAL')">Buy</button>
        `;

            const topDeckBtn = me.topDeckNextShip > 0 ? `
            <button onclick="buy('${c.id}', 'TOP_DECK_OPTIONAL')">Top deck</button>
        ` : "";

            const freeTopBtn = me.buyFreeTopDeck > 0 ? `
            <button onclick="buy('${c.id}', 'FREE_TOP_DECK_REQUIRED')">Free top</button>
        ` : "";

            div.innerHTML += `
            ${cardView(c)}
            ${buyBtn}
            ${topDeckBtn}
            ${freeTopBtn}
        `;
        });
    }

    /* ================= EXPLORERS ================= */

    function renderExplorers() {
        const div = document.getElementById("explorers");
        div.innerHTML = "";

        const me = gameView.players.find(p => p.playerId === privateView.playerId);

        gameView.explorerPile.forEach(c => {

            let buttons = `
            <button onclick="buy('${c.id}','NORMAL')">Buy</button>
        `;

            if (me?.topDeckNextShip > 0) {
                buttons += `
                <button onclick="buy('${c.id}','TOP_DECK_OPTIONAL')">
                    Top Deck
                </button>
            `;
            }

            if (me?.buyFreeTopDeck > 0) {
                buttons += `
                <button onclick="buy('${c.id}','FREE_TOP_DECK_REQUIRED')">
                    Free Top Deck
                </button>
            `;
            }

            div.innerHTML += `
            ${cardView(c)}
            ${buttons}
        `;
        });
    }

    /* ================= ACTIONS ================= */

    function play(cardId) {
        const factionSelect = document.getElementById("cardFaction-" + cardId);

        client.publish({
            destination: "/app/game.playCard",
            body: JSON.stringify({
                gameId,
                cardId,
                scrap: document.getElementById("scrap-" + cardId)?.checked || false,
                cardFaction: factionSelect ? factionSelect.value || null : null
            })
        });
    }

    function buy(id, type) {
        client.publish({
            destination: "/app/game.buyCard",
            body: JSON.stringify({
                gameId,
                marketCardId: id,
                type: type
            })
        });
    }

    function exile(id, code) {
        client.publish({
            destination: "/app/game.exileCard",
            body: JSON.stringify({ gameId, cardId:id, cardCode:code })
        });
    }

    function attackPlayer() {
        client.publish({
            destination: "/app/game.attack",
            body: JSON.stringify({ gameId, targetType:"PLAYER" })
        });
    }

    function attackStructure(id, type) {
        client.publish({
            destination: "/app/game.attack",
            body: JSON.stringify({
                gameId,
                targetType: type,
                targetId: id
            })
        });
    }

    function scrapStructure(id) {
        client.publish({
            destination: "/app/game.scrapStructure",
            body: JSON.stringify({ gameId, cardId:id })
        });
    }

    function destroyBase(id) {
        client.publish({
            destination: "/app/game.destroyBase",
            body: JSON.stringify({ gameId, BaseId:id })
        });
    }

    function endTurn() {
        client.publish({
            destination: "/app/game.endTurn",
            body: JSON.stringify({ gameId })
        });
    }

    function showError(text) {
        const d = document.getElementById("errors");
        d.innerHTML = `<div class="error">${text}</div>`;
        setTimeout(()=>d.innerHTML="",4000);
    }

    function forcedDiscard(id) {
        client.publish({
            destination: "/app/game.forcedDiscard",
            body: JSON.stringify({
                gameId,
                cardId: id
            })
        });
    }

    function getMe() {
        return gameView.players.find(p => p.playerId === privateView.playerId);
    }
</script>

</body>
</html>
